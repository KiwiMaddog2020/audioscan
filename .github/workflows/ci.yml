name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install ffmpeg (Linux)
        # The golden-loudness test cross-checks against ffmpeg's ebur128 and
        # skips when ffmpeg is absent; install it on Linux so it actually runs.
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-targets

      - name: Test release
        run: cargo test --release --all-targets

      - name: Test doctests
        run: cargo test --doc

      - name: C API smoke (Linux)
        # Build the capi feature (cbindgen regenerates the header), then compile
        # and run the C example against the cdylib end to end.
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo build --features capi
          cc examples/c_api.c -Iinclude -Ltarget/debug -laudioscan -o /tmp/c_api_demo
          LD_LIBRARY_PATH=target/debug /tmp/c_api_demo tests/fixtures/tone_1khz_1s.flac

  msrv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: cargo check
